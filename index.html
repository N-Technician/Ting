<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Income Program</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#0f2027;
    overflow:hidden;
}

/* APP CONTAINER */
.app{
    width:100vw;
    height:100vh;
    position:relative;
}

/* SCREENS */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    transition:0.5s;
    left:100%;
}

.active{
    left:0;
}

/* CARD */
.card{
    background:white;
    color:black;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:400px;
    text-align:center;
}

/* BUTTON */
button{
    padding:14px 25px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

/* INPUT */
input, textarea{
    width:90%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

/* TIMER */
.timer{
    font-size:20px;
    margin-top:10px;
    color:#00ffcc;
}
</style>
</head>

<body>

<div class="app">

<!-- HERO -->
<div class="screen active" id="screen1">
    <h1>🚀 AI Income Program</h1>
    <p>Learn simple ways to earn online using AI.</p>

    <div class="timer" id="timer"></div>

    <button onclick="next(2)">Participate</button>
</div>

<!-- REGISTER -->
<div class="screen" id="screen2">
    <div class="card">
        <h2>Join Now</h2>

        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <input type="text" placeholder="Phone Number">

        <button onclick="next(3)">Continue</button>
    </div>
</div>

<!-- SUCCESS -->
<div class="screen" id="screen3">
    <div class="card">
        <h2>✅ You're In</h2>
        <p>Just answer few questions</p>
        <button onclick="next(4)">Start</button>
    </div>
</div>

<!-- QUESTIONS -->
<div class="screen" id="screen4">
    <div class="card">
        <h3>Tell us about you 😊</h3>

        <textarea placeholder="What do you want to achieve?"></textarea>
        <textarea placeholder="What are you doing now?"></textarea>
        <textarea placeholder="Do you know anything about online earning?"></textarea>
        <textarea placeholder="How much time can you give daily?"></textarea>
        <textarea placeholder="What problem are you facing right now?"></textarea>
        <textarea placeholder="Why should we choose you?"></textarea>

        <button onclick="submitApp()">Submit</button>
    </div>
</div>

<!-- RESULT -->
<div class="screen" id="screen5">
    <div class="card">
        <h2 id="resultText"></h2>
        <button onclick="next(6)">Continue</button>
    </div>
</div>

<!-- PAYMENT -->
<div class="screen" id="screen6">
    <div class="card">
        <h2>💰 Unlock Full Access</h2>
        <p>Pay NPR 999 to continue</p>

        <button onclick="alert('Redirect to payment')">
            Pay Now
        </button>
    </div>
</div>

</div>

<script>

/* NAVIGATION */
function next(n){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById("screen"+n).classList.add("active");
}

/* TIMER */
let end = new Date().getTime() + (24*60*60*1000);

setInterval(()=>{
    let now = new Date().getTime();
    let diff = end - now;

    let h = Math.floor(diff/(1000*60*60));
    let m = Math.floor((diff%(1000*60*60))/(1000*60));
    let s = Math.floor((diff%(1000*60))/1000);

    document.getElementById("timer").innerHTML =
    "⏳ Ends in: "+h+"h "+m+"m "+s+"s";
},1000);

/* AI SCORING */
function submitApp(){
    let textareas = document.querySelectorAll("textarea");
    let score = 0;

    textareas.forEach(t=>{
        if(t.value.length > 80) score += 20;
        else if(t.value.length > 40) score += 10;
        else score += 5;
    });

    let result = document.getElementById("resultText");

    if(score > 90){
        result.innerHTML = "🔥 You are selected!";
    } else if(score > 60){
        result.innerHTML = "⚡ We will review your application.";
    } else {
        result.innerHTML = "❌ Not selected";
    }

    next(5);
}

</script>

</body>
</html>
