<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Program</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f2027,#2c5364);
    height:100vh;
    overflow:hidden;
}

/* SCREENS */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transform:scale(0.95);
    transition:0.4s ease;
}

.active{
    opacity:1;
    transform:scale(1);
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:16px;
    width:90%;
    max-width:380px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* INPUT */
input, textarea{
    width:90%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

/* BUTTON */
button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#0866ff;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

/* DASHBOARD */
.dashboard{
    width:90%;
    max-width:600px;
    color:black;
}

.user{
    background:#f1f1f1;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    text-align:left;
}
</style>
</head>

<body>

<!-- HERO -->
<div id="s1" class="screen active">
    <div class="card">
        <h2>🚀 AI Income Program</h2>
        <p>Learn simple ways to earn online using AI</p>
        <button onclick="show('s2')">Participate</button>
        <button onclick="show('login')">Login</button>
    </div>
</div>

<!-- REGISTER -->
<div id="s2" class="screen">
    <div class="card">
        <h3>Create Account</h3>
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="register()">Continue</button>
    </div>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
    <div class="card">
        <h3>Login</h3>
        <input id="loginEmail" placeholder="Email">
        <input id="loginPass" type="password" placeholder="Password">
        <button onclick="loginUser()">Login</button>
    </div>
</div>

<!-- QUESTIONS -->
<div id="s3" class="screen">
    <div class="card">
        <h3>Tell us about you</h3>
        <textarea placeholder="What do you want to achieve?"></textarea>
        <textarea placeholder="What are you doing now?"></textarea>
        <textarea placeholder="Any experience online?"></textarea>
        <textarea placeholder="How much time can you give?"></textarea>
        <textarea placeholder="Your biggest problem?"></textarea>
        <textarea placeholder="Why should we choose you?"></textarea>
        <button onclick="submitApp()">Submit</button>
    </div>
</div>

<!-- RESULT -->
<div id="s4" class="screen">
    <div class="card">
        <h2 id="result"></h2>
        <button onclick="show('s1')">Back Home</button>
    </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin" class="screen">
    <div class="card dashboard">
        <h2>📊 Admin Dashboard</h2>
        <div id="users"></div>
        <button onclick="show('s1')">Logout</button>
    </div>
</div>

<script>

/* SCREEN SWITCH */
function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* REGISTER */
function register(){
    let user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        pass: document.getElementById("pass").value
    };

    localStorage.setItem(user.email, JSON.stringify(user));
    show('s3');
}

/* LOGIN */
function loginUser(){
    let email = document.getElementById("loginEmail").value;
    let pass = document.getElementById("loginPass").value;

    // ADMIN LOGIN
    if(email === "admin" && pass === "admin123"){
        loadUsers();
        show('admin');
        return;
    }

    let user = JSON.parse(localStorage.getItem(email));

    if(user && user.pass === pass){
        show('s3');
    } else {
        alert("Wrong login");
    }
}

/* AI SCORING */
function submitApp(){
    let answers = document.querySelectorAll("textarea");
    let score = 0;

    answers.forEach(a=>{
        if(a.value.length > 80) score+=20;
        else if(a.value.length > 40) score+=10;
        else score+=5;
    });

    let resultText = score > 90 ? "🔥 Selected!" :
                     score > 60 ? "⚡ Under Review" :
                     "❌ Not Selected";

    document.getElementById("result").innerText = resultText;

    // SAVE USER DATA
    let all = JSON.parse(localStorage.getItem("applications") || "[]");
    all.push({score:score});
    localStorage.setItem("applications", JSON.stringify(all));

    show('s4');
}

/* ADMIN VIEW */
function loadUsers(){
    let list = document.getElementById("users");
    list.innerHTML = "";

    let data = JSON.parse(localStorage.getItem("applications") || "[]");

    data.forEach((u,i)=>{
        list.innerHTML += `<div class="user">User ${i+1} - Score: ${u.score}</div>`;
    });
}

</script>

</body>
</html>
